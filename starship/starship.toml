# Use the color palette
palette = "dracula"
format = "$shlvl$directory$jobs${custom.docker}$aws$cmd_duration$line_break$character"

[aws]
style = "bold orange"

[character]
error_symbol = "[❯](bold red)"
success_symbol = "[❯](bold green)"

[cmd_duration]
style = "bold yellow"

[directory]
style = "bold green"

[docker_context]
disabled = true

[custom.docker]
command = "ctx=$(docker context show); [ \"$ctx\" = 'desktop-linux' ] && echo docker || echo $ctx"
when = true
format = "[🐳 $output]($style) "
style = "bold blue"

[git_branch]
disabled = true

[git_status]
disabled = true

[git_commit]
disabled = true

[git_state]
disabled = true

[hostname]
style = "bold purple"

[jobs]
style = "bold cyan"

[shlvl]
disabled = false
threshold = 3
style = "bold yellow"
format = "[$symbol$shlvl]($style) "

[nodejs]
disabled = true

[username]
format = "[$user]($style) on "
style_user = "bold cyan"


