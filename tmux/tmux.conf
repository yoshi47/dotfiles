set -g mouse on

unbind C-b
set -g prefix C-j
set-window-option -g mode-keys vi
# set -g status-keys emacs

bind C-g display-panes
bind g display-panes
set -g display-panes-time 4000

set -g default-shell /bin/zsh

unbind C-l

# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"
set-option -a terminal-overrides ",alacritty:RGB"

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -s escape-time 0
set -g history-limit 50000
set -g display-time 2000
set -g focus-events on

# Refresh status immediately when switching sessions.
# Don't pass -t here: in some setups #{hook_client} is like "client-1234" and refresh-client expects a tty-like target.
set-hook -g client-session-changed "refresh-client -S"

# Status/border colours are applied by ~/.config/tmux/scripts/apply_theme_colors.sh (at end of file).

setw -g aggressive-resize on
set -g detach-on-destroy off
set -g renumber-windows on

## reload of the config
unbind r
bind r run-shell 'conf="$HOME/.config/tmux/tmux.conf"; \
  [ -f "$HOME/.config/tmux/tmux.#{socket_name}.conf" ] && conf="$HOME/.config/tmux/tmux.#{socket_name}.conf"; \
  tmux source-file "$conf" && tmux display "Reloaded $conf"'

TMUX_FZF_LAUNCH_KEY="C-f"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin '27medkamal/tmux-session-wizard'
set -g @plugin 'tmux-plugins/tmux-sessionist'
# Set resurrect dir only if not already configured by a socket-specific conf
# (e.g. tmux.personal.conf sets it BEFORE sourcing this file).
# #{socket_name} is empty during config parsing, so %if dispatch won't work.
# run-shell blocks during config loading, so the dir is set before TPM/plugins run.
run-shell 'dir="$(tmux show-option -gqv @resurrect-dir)"; \
  [ -z "$dir" ] && tmux set -g @resurrect-dir "~/.config/tmux/resurrect-default"; true'
set -g @resurrect-delete-backup-after '1'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'


set -g @sessionist-alternate 'S'

# Yazi file picker (new-window; popup unsupported due to passthrough limitation)
bind f run-shell 'tmux new-window -n yazi-picker "~/.config/yazi/yazi-picker.sh"'

# Clear app-waiting and app-alert flags on current window
bind Enter set-option -wu @app_waiting \; set-option -wu @app_waiting_pane \; set-option -wu @app_alert \; set-option -wu @app_alert_pane

# Jump to next alerted window (cross-session)
bind a run-shell $HOME/.config/tmux/scripts/jump_alert_window.sh
# Jump to next waiting window (cross-session)
bind A run-shell $HOME/.config/tmux/scripts/jump_waiting_window.sh

run '~/.config/tmux/plugins/tpm/tpm'

# Force auto-restore for multi-socket setups (continuum skips when another server is running)
run-shell '~/.config/tmux/scripts/continuum_force_autorestore.sh'

# Disable tmux-sessionist default binding (prefix + g)
unbind g
# Session navigation (next session)
bind C-n run-shell $HOME/.config/tmux/scripts/session_cycle_next.sh
bind C-p run-shell $HOME/.config/tmux/scripts/session_cycle_prev.sh
# Session chooser (prefix + C-j = choose-tree, same as prefix + s)
bind C-j choose-tree -s


# Dual status line
set -g status 2
set -g status-interval 10
set -g status-justify left
set -g status-left-length 120
set -g status-right-length 150

set -g pane-border-status top
# pane-border-format, border styles, status-format, window formats
# are all set by apply_theme_colors.sh

# Apply theme colors (selected by TMUX_THEME_PALETTE env var; default: dracula)
run-shell "~/.config/tmux/scripts/apply_theme_colors.sh"

# Keep copy-mode after mouse selection (avoid scroll jump)
# Bind in both tables to avoid plugin or mode-keys overrides
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi C-n send-keys -X cursor-down
bind-key -T copy-mode-vi C-p send-keys -X cursor-up
bind-key -T copy-mode-vi C-f send-keys -X cursor-right
bind-key -T copy-mode-vi C-b send-keys -X cursor-left
bind-key -T copy-mode-vi C-a send-keys -X start-of-line
bind-key -T copy-mode-vi C-e send-keys -X end-of-line
