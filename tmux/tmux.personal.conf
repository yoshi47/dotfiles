# Set theme env vars BEFORE sourcing main conf so that
# run-shell apply_theme_colors.sh picks up the personal palette.
# set-environment -g persists in the server even across conf reloads.
set-environment -g TMUX_THEME_PALETTE "monokai"

source-file ~/.config/tmux/tmux.conf

# Override resurrect save dir for personal socket
set -g @resurrect-dir '~/.config/tmux/resurrect-personal'

# Force continuum auto-save on this server.
# continuum skips auto-save when another tmux server is already running,
# but we want independent saves per socket (personal vs default).
run-shell '~/.config/tmux/scripts/continuum_force_autosave.sh'
