[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_dir_first = false
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll", "touch"]

[preview]
tab_size     = 2
max_width    = 600
max_height   = 900

[opener]
airdrop = [
  { run = "~/.config/yazi/plugins/airdrop.yazi/airdrop %s", desc = "Share via AirDrop", for = "macos", orphan = true },
]
vscode = [
  { run = 'code %s', desc = "Open with VSCode", orphan = true },
]
open-with = [
  { run = 'app=$(osascript -e "try" -e "return POSIX path of (choose file of type {\"app\"} default location \"/Applications\")" -e "end try") && [ -n "$app" ] && open -a "$app" %s', desc = "Open with...", for = "macos", orphan = true },
]

[open]
rules = [
  { url = "*/",                                                                                                       use = [ "open", "vscode", "open-with", "airdrop", "edit", "reveal" ] },
  { mime = "text/*",                                                                                                  use = [ "vscode", "open-with", "airdrop", "reveal" ] },
  { mime = "image/*",                                                                                                 use = [ "open", "vscode", "open-with", "airdrop", "reveal" ] },
  { mime = "{audio,video}/*",                                                                                         use = [ "play", "vscode", "open-with", "airdrop", "reveal" ] },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",            use = [ "extract", "vscode", "open-with", "airdrop", "reveal" ] },
  { mime = "application/{json,ndjson}",                                                                               use = [ "vscode", "open-with", "airdrop", "reveal" ] },
  { mime = "*/javascript",                                                                                            use = [ "vscode", "open-with", "airdrop", "reveal" ] },
  { mime = "inode/empty",                                                                                             use = [ "vscode", "open-with", "airdrop", "reveal" ] },
  { mime = "vfs/{absent,stale}",                                                                                      use = "download" },
  { url = "*",                                                                                                        use = [ "open", "vscode", "open-with", "airdrop", "reveal" ] },
]

[[plugin.prepend_previewers]]
mime = "text/markdown"
run  = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'

[[plugin.prepend_fetchers]]
id  = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*/"
run = "git"
